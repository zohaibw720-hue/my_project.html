<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0E1116;
    --panel: #161B22;
    --border: #262C36;
    --text: #EDEFF2;
    --muted: #8A93A3;
    --accent: #D9A24B;
    --accent-soft: rgba(217,162,75,0.12);
    --error: #E5675B;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    min-height:100vh;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(217,162,75,0.07), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(217,162,75,0.05), transparent 40%);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Inter', sans-serif;
    color: var(--text);
    padding:24px;
  }

  .card{
    width:100%;
    max-width:400px;
    background: var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:40px 36px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    position:relative;
    overflow:hidden;
  }

  .card::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:3px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .mark{
    width:42px; height:42px;
    border-radius:10px;
    background: var(--accent-soft);
    border:1px solid rgba(217,162,75,0.35);
    display:flex; align-items:center; justify-content:center;
    margin-bottom:22px;
  }
  .mark svg{ width:20px; height:20px; }

  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:28px;
    letter-spacing:-0.01em;
    margin-bottom:6px;
  }

  .subtitle{
    color: var(--muted);
    font-size:14px;
    margin-bottom:28px;
  }

  form{ display:flex; flex-direction:column; gap:16px; }

  .field{ display:flex; flex-direction:column; gap:6px; }

  label{
    font-size:12px;
    font-weight:500;
    letter-spacing:0.03em;
    text-transform:uppercase;
    color: var(--muted);
  }

  .input-wrap{ position:relative; }

  input{
    width:100%;
    background:#0E1116;
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px 14px;
    font-size:14.5px;
    color: var(--text);
    font-family:'Inter', sans-serif;
    transition: border-color .15s ease, box-shadow .15s ease;
  }

  input::placeholder{ color:#54607A; }

  input:focus{
    outline:none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .row-between{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:13px;
    margin-top:-2px;
  }

  .remember{
    display:flex;
    align-items:center;
    gap:8px;
    color: var(--muted);
  }

  .remember input[type="checkbox"]{
    width:15px; height:15px;
    accent-color: var(--accent);
    cursor:pointer;
  }

  .forgot{
    color: var(--accent);
    text-decoration:none;
  }
  .forgot:hover{ text-decoration:underline; }

  button{
    margin-top:6px;
    background: var(--accent);
    color:#1A1304;
    border:none;
    border-radius:8px;
    padding:13px;
    font-size:14.5px;
    font-weight:600;
    font-family:'Inter', sans-serif;
    cursor:pointer;
    transition: transform .12s ease, box-shadow .12s ease, background .15s ease;
  }

  button:hover{
    background:#E7B765;
    box-shadow: 0 8px 24px rgba(217,162,75,0.25);
  }

  button:active{ transform: translateY(1px); }

  button:focus-visible, .forgot:focus-visible, input:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .divider{
    display:flex;
    align-items:center;
    gap:10px;
    margin:22px 0 18px;
    color: var(--muted);
    font-size:12px;
  }
  .divider::before, .divider::after{
    content:"";
    flex:1;
    height:1px;
    background: var(--border);
  }

  .signup{
    text-align:center;
    font-size:13.5px;
    color: var(--muted);
  }
  .signup a{
    color: var(--text);
    font-weight:600;
    text-decoration:none;
    border-bottom:1px solid var(--accent);
  }

  @media (max-width: 420px){
    .card{ padding:32px 24px 28px; }
  }

  @media (prefers-reduced-motion: reduce){
    button{ transition:none; }
  }
</style>
</head>
<body>

  <div class="card">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#D9A24B" stroke-width="1.6">
        <path d="M12 2 L20 6 V12 C20 17 16.5 20.5 12 22 C7.5 20.5 4 17 4 12 V6 Z"/>
        <path d="M9 12 L11 14 L15.5 9.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue to your account</p>

    <form onsubmit="event.preventDefault();">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>

      <div class="row-between">
        <label class="remember">
          <input type="checkbox">
          Remember me
        </label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <button type="submit">Sign in</button>
    </form>

    <div class="divider">or</div>

    <p class="signup">Don't have an account? <a href="#">Create one</a></p>
  </div>

</body>
</html>
